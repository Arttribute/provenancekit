name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm --filter './packages/*' run build

      - name: Auto-generate patch changeset when packages changed without one
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "chore: version packages"; then
            echo "Version commit — skipping auto-patch to allow publish"
            exit 0
          fi

          EXISTING=$(ls .changeset/*.md 2>/dev/null | grep -v README | wc -l)
          if [ "$EXISTING" -gt "0" ]; then
            echo "Changesets already present — skipping auto-patch"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGED=$(git diff --name-only "$LAST_TAG" HEAD -- packages/ | grep -v 'node_modules' | head -1)

          if [ -z "$CHANGED" ]; then
            echo "No package source changes since last tag — skipping auto-patch"
            exit 0
          fi

          echo "Package changes detected since $LAST_TAG — generating auto patch changeset for changed packages only"

          # Map changed file paths to package names
          CHANGED_FILES=$(git diff --name-only "$LAST_TAG" HEAD -- packages/ | grep -v 'node_modules')

          node -e "
            const fs = require('fs');
            const changedFiles = \`$CHANGED_FILES\`.trim().split('\n').filter(Boolean);

            // Map directory prefix → package name
            const dirToPackage = {
              'packages/eaa-types':                  '@provenancekit/eaa-types',
              'packages/provenancekit-sdk':           '@provenancekit/sdk',
              'packages/provenancekit-storage':       '@provenancekit/storage',
              'packages/provenancekit-extensions':    '@provenancekit/extensions',
              'packages/provenancekit-privacy':       '@provenancekit/privacy',
              'packages/provenancekit-payments':      '@provenancekit/payments',
              'packages/provenancekit-git':           '@provenancekit/git',
              'packages/provenancekit-media':         '@provenancekit/media',
              'packages/provenancekit-indexer':       '@provenancekit/indexer',
              'packages/provenancekit-ui':            '@provenancekit/ui',
              'packages/provenancekit-contracts':     '@provenancekit/contracts',
            };

            const changed = new Set();
            for (const file of changedFiles) {
              for (const [dir, pkg] of Object.entries(dirToPackage)) {
                if (file.startsWith(dir + '/') || file === dir) {
                  changed.add(pkg);
                  break;
                }
              }
            }

            if (changed.size === 0) {
              console.log('No matching packages — skipping changeset');
              process.exit(0);
            }

            const id = Math.random().toString(36).slice(2, 10);
            const frontmatter = [...changed].map(p => \`'\${p}': patch\`).join('\n');
            const content = \`---\n\${frontmatter}\n---\n\nAuto patch release\n\`;
            fs.writeFileSync(\`.changeset/auto-\${id}.md\`, content);
            console.log('Created .changeset/auto-' + id + '.md for: ' + [...changed].join(', '));
          "

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
