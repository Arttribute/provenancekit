steps:
  # Install deps, build workspace packages, build API, create standalone deploy bundle
  - name: node:22
    dir: "."
    entrypoint: bash
    args:
      - "-c"
      - |
        corepack enable pnpm
        corepack prepare pnpm@10.12.1 --activate
        pnpm install --no-frozen-lockfile
        pnpm --filter './packages/*' run build
        pnpm --filter provenancekit-api run build
        pnpm deploy --filter provenancekit-api --prod apps/provenancekit-api/standalone
        cp -r apps/provenancekit-api/dist apps/provenancekit-api/standalone/dist

  - name: "gcr.io/cloud-builders/docker"
    dir: "./apps/provenancekit-api"
    args:
      - build
      - "-t"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/provenancekit/provenancekit-api:$SHORT_SHA"
      - "-f"
      - Dockerfile
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - tag
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/provenancekit/provenancekit-api:$SHORT_SHA"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/provenancekit/provenancekit-api:prod"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/provenancekit/provenancekit-api"
      - "--all-tags"

  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arttribute-provenancekit-api-prod
      - --region=europe-west1
      - --platform=managed
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/provenancekit/provenancekit-api:prod
    timeout: 1800s
